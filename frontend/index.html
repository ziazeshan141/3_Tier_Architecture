<!DOCTYPE html>
<html>
<head>
<title>Three Tier App</title>
</head>

<body>

<h1>WEbsite is Running🚀</h1>

<button onclick="getMessage()">Call Backend</button>

<h2 id="result"></h2>

<script>

function getMessage(){

fetch("/api")

.then(response => response.json())

.then(data => {

document.getElementById("result").innerHTML=data.message;

});

}

</script>

</body>
</html>
