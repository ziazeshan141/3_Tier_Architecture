<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Tier DevOps Application</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h1 {
            color: #0077cc;
        }

        p {
            font-size: 18px;
            color: #555;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 16px;
            background: #0077cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #005fa3;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Welcome to My 3-Tier DevOps Application</h1>

    <p>Deployed on Kubernetes (Amazon EKS) using Jenkins CI/CD</p>

    <button onclick="callBackend()">Call Backend API</button>

    <div id="result"></div>
</div>

<script>
function callBackend() {
    fetch('/api')
        .then(response => response.text())
        .then(data => {
            document.getElementById('result').innerHTML = data;
        })
        .catch(error => {
            document.getElementById('result').innerHTML =
                "Backend connection failed!";
        });
}
</script>

</body>
</html>
